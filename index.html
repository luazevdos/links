  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0a0a0a;
      color: #f5f0eb;

      font-weight: 300;

    }

    .container {
      width: 100%;
      max-width: 380px;
      padding: 50px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* === AVATAR === */
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid #c8a83e;
      overflow: hidden;
      margin-bottom: 20px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-placeholder {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 600;
      color: #c8a83e;
    }

    /* === HEADER === */
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 12px;
      color: #8a8278;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* === SOCIAL ICONS === */
    .social-icons {
      display: flex;
      gap: 14px;
      margin-bottom: 36px;
    }

    .social-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid #2a2622;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #8a8278;
      transition: all 0.3s ease;
    }

    .social-icon:hover {
      border-color: #c8a83e;
      color: #c8a83e;
    }

    .social-icon svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* === LINK CARDS === */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 44px;
    }

    .link-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 20px 20px;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      text-decoration: none;
      color: #f5f0eb;
      transition: all 0.3s ease;
    }

    .link-card:hover {
      border-color: #c8a83e;
      background: #1a1a18;
    }

    .link-card-content {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .link-card-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .link-card-subtitle {
      font-size: 11px;
      color: #6a6560;
      letter-spacing: 0.3px;
    }

    .link-card-arrow {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .link-card:hover .link-card-arrow {
      background: #c8a83e;
    }

    .link-card-arrow svg {
      width: 12px;
      height: 12px;
      fill: none;
      stroke: #6a6560;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: all 0.3s ease;
    }

    .link-card:hover .link-card-arrow svg {
      stroke: #0a0a0a;
    }

    .link-card.featured {
      border-color: #c8a83e33;
      background: linear-gradient(135deg, #141410, #1a1812);
    }

    .link-card.featured .link-card-arrow {
      background: #c8a83e;
    }

    .link-card.featured .link-card-arrow svg {
      stroke: #0a0a0a;
    }

    .link-card.featured:hover {
      border-color: #c8a83e;
    }

    /* === FOOTER === */
    .footer-social {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .footer-social-icon {
      color: #3a3632;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer-social-icon:hover {
      color: #c8a83e;
    }

    .footer-social-icon svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .footer-text {
      font-size: 11px;
      color: #2a2622;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
